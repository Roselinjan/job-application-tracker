<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Job Application Tracker AWS Architecture</title>
  <desc>Architecture diagram showing user flow through CloudFront, S3, API Gateway, Lambda, DynamoDB, SES, Step Functions, and CloudWatch</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: Arial, sans-serif; fill: #1a1a1a; }
      .th { font-size: 13px; font-weight: 600; }
      .ts { font-size: 11px; fill: #555; }
      .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
      .c-purple text { fill: #3C3489; }
      .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
      .c-teal text { fill: #085041; }
      .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
      .c-blue text { fill: #0C447C; }
      .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
      .c-amber text { fill: #633806; }
      .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
      .c-coral text { fill: #711B13; }
      .c-green rect { fill: #EAF3DE; stroke: #3B6D11; }
      .c-green text { fill: #27500A; }
      .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
      .c-gray text { fill: #444441; }
      .c-pink rect { fill: #FBEAF0; stroke: #993556; }
      .c-pink text { fill: #72243E; }
      .arr { stroke: #888; fill: none; stroke-width: 1.5; }
      .dashed { stroke: #bbb; fill: none; stroke-width: 1.5; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <!-- AWS Cloud boundary -->
  <rect x="140" y="20" width="520" height="580" rx="16" fill="none" stroke="#ccc" stroke-width="1" stroke-dasharray="6 4"/>
  <text class="ts" x="155" y="38" style="fill:#aaa">AWS Cloud</text>

  <!-- User -->
  <g class="c-gray">
    <rect x="20" y="90" width="80" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="60" y="107" text-anchor="middle" dominant-baseline="central">User</text>
  </g>

  <!-- Arrow: User to CloudFront -->
  <line x1="100" y1="112" x2="158" y2="112" class="arr" marker-end="url(#arrow)"/>

  <!-- CloudFront -->
  <g class="c-purple">
    <rect x="160" y="90" width="110" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="215" y="107" text-anchor="middle" dominant-baseline="central">CloudFront</text>
    <text class="ts" x="215" y="123" text-anchor="middle" dominant-baseline="central">CDN + OAC</text>
  </g>

  <!-- Arrow: CloudFront to S3 -->
  <line x1="215" y1="134" x2="215" y2="178" class="arr" marker-end="url(#arrow)"/>

  <!-- S3 -->
  <g class="c-teal">
    <rect x="160" y="180" width="110" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="215" y="197" text-anchor="middle" dominant-baseline="central">Amazon S3</text>
    <text class="ts" x="215" y="213" text-anchor="middle" dominant-baseline="central">Private hosting</text>
  </g>

  <!-- Arrow: CloudFront to API Gateway -->
  <line x1="270" y1="112" x2="328" y2="112" class="arr" marker-end="url(#arrow)"/>
  <text class="ts" x="299" y="104" text-anchor="middle" style="fill:#aaa">POST</text>

  <!-- API Gateway -->
  <g class="c-blue">
    <rect x="330" y="90" width="110" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="385" y="107" text-anchor="middle" dominant-baseline="central">API Gateway</text>
    <text class="ts" x="385" y="123" text-anchor="middle" dominant-baseline="central">REST + CORS</text>
  </g>

  <!-- Arrow: API Gateway to Lambda 1 -->
  <line x1="385" y1="134" x2="385" y2="178" class="arr" marker-end="url(#arrow)"/>

  <!-- Lambda 1 -->
  <g class="c-amber">
    <rect x="300" y="180" width="170" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="385" y="200" text-anchor="middle" dominant-baseline="central">Lambda 1</text>
    <text class="ts" x="385" y="218" text-anchor="middle" dominant-baseline="central">jobtracker-save</text>
  </g>

  <!-- Arrow: Lambda 1 to DynamoDB -->
  <line x1="300" y1="207" x2="238" y2="280" class="arr" marker-end="url(#arrow)"/>

  <!-- DynamoDB -->
  <g class="c-teal">
    <rect x="160" y="282" width="110" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="215" y="299" text-anchor="middle" dominant-baseline="central">DynamoDB</text>
    <text class="ts" x="215" y="315" text-anchor="middle" dominant-baseline="central">Store leads</text>
  </g>

  <!-- Arrow: Lambda 1 to SES confirmation -->
  <line x1="470" y1="207" x2="530" y2="270" class="arr" marker-end="url(#arrow)"/>

  <!-- SES Confirmation -->
  <g class="c-coral">
    <rect x="490" y="272" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="560" y="289" text-anchor="middle" dominant-baseline="central">Amazon SES</text>
    <text class="ts" x="560" y="305" text-anchor="middle" dominant-baseline="central">Confirmation email</text>
  </g>

  <!-- Arrow: Lambda 1 to Step Functions -->
  <line x1="385" y1="234" x2="385" y2="338" class="arr" marker-end="url(#arrow)"/>

  <!-- Step Functions -->
  <g class="c-pink">
    <rect x="300" y="340" width="170" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="385" y="360" text-anchor="middle" dominant-baseline="central">Step Functions</text>
    <text class="ts" x="385" y="378" text-anchor="middle" dominant-baseline="central">jobtracker-workflow</text>
  </g>

  <!-- Arrow: Step Functions to Wait -->
  <line x1="385" y1="394" x2="385" y2="438" class="arr" marker-end="url(#arrow)"/>

  <!-- Wait State -->
  <g class="c-gray">
    <rect x="300" y="440" width="170" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="385" y="457" text-anchor="middle" dominant-baseline="central">Wait State</text>
    <text class="ts" x="385" y="473" text-anchor="middle" dominant-baseline="central">N days (dynamic)</text>
  </g>

  <!-- Arrow: Wait to Lambda 2 -->
  <line x1="385" y1="484" x2="385" y2="528" class="arr" marker-end="url(#arrow)"/>

  <!-- Lambda 2 -->
  <g class="c-amber">
    <rect x="300" y="530" width="170" height="54" rx="8" stroke-width="0.5"/>
    <text class="th" x="385" y="550" text-anchor="middle" dominant-baseline="central">Lambda 2</text>
    <text class="ts" x="385" y="568" text-anchor="middle" dominant-baseline="central">jobtracker-reminder</text>
  </g>

  <!-- Arrow: Lambda 2 to SES Reminder -->
  <line x1="470" y1="557" x2="488" y2="557" class="arr" marker-end="url(#arrow)"/>

  <!-- SES Reminder -->
  <g class="c-coral">
    <rect x="490" y="534" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="560" y="551" text-anchor="middle" dominant-baseline="central">Amazon SES</text>
    <text class="ts" x="560" y="567" text-anchor="middle" dominant-baseline="central">Reminder email</text>
  </g>

  <!-- CloudWatch dashed -->
  <line x1="470" y1="395" x2="488" y2="395" class="dashed" marker-end="url(#arrow)"/>

  <!-- CloudWatch -->
  <g class="c-green">
    <rect x="490" y="372" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="560" y="389" text-anchor="middle" dominant-baseline="central">CloudWatch</text>
    <text class="ts" x="560" y="405" text-anchor="middle" dominant-baseline="central">Logs + metrics</text>
  </g>

  <!-- IAM dashed -->
  <line x1="490" y1="460" x2="472" y2="420" class="dashed" marker-end="url(#arrow)"/>

  <!-- IAM -->
  <g class="c-gray">
    <rect x="490" y="450" width="140" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="560" y="467" text-anchor="middle" dominant-baseline="central">IAM Roles</text>
    <text class="ts" x="560" y="483" text-anchor="middle" dominant-baseline="central">Least privilege</text>
  </g>

  <!-- Legend -->
  <line x1="165" y1="590" x2="195" y2="590" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text class="ts" x="200" y="594">Data flow</text>
  <line x1="290" y1="590" x2="320" y2="590" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="325" y="594">Config / IAM</text>
</svg>
